services:
  mysql:
    image: mysql:8.4
    container_name: ax-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: kail3114
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pkail3114"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka:
    build:
      context: .
      args:
        MODULE: eureka-server
    container_name: ax-eureka
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: .
      args:
        MODULE: api-gateway
    container_name: ax-gateway
    ports:
      - "9090:9090"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      JWT_SECRET: YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024AcquirerX
      JWT_EXPIRATION: 86400000
      GATEWAY_JWT_OPEN_PATHS: /api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/validate,/actuator,/eureka,/v3/api-docs,/swagger-ui
    depends_on:
      - eureka

  auth-service:
    build:
      context: .
      args:
        MODULE: auth-service
    container_name: ax-auth
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/acquirerx_auth?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kail3114
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      JWT_SECRET: YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024AcquirerX
      JWT_EXPIRATION: 86400000
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  merchant-service:
    build:
      context: .
      args:
        MODULE: merchant-service
    container_name: ax-merchant
    ports:
      - "9091:9091"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/acquirerx_merchant?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kail3114
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  terminal-service:
    build:
      context: .
      args:
        MODULE: terminal-service
    container_name: ax-terminal
    ports:
      - "9092:9092"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/acquirerx_terminal?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kail3114
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  transaction-service:
    build:
      context: .
      args:
        MODULE: transaction-service
    container_name: ax-transaction
    ports:
      - "9093:9093"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/acquirerx_transaction?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kail3114
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  risk-service:
    build:
      context: .
      args:
        MODULE: risk-service
    container_name: ax-risk
    ports:
      - "9094:9094"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/acquirerx_risk?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kail3114
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  settlement-service:
    build:
      context: .
      args:
        MODULE: settlement-service
    container_name: ax-settlement
    ports:
      - "9095:9095"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/acquirerx_settlement?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kail3114
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  ops-service:
    build:
      context: .
      args:
        MODULE: ops-service
    container_name: ax-ops
    ports:
      - "9096:9096"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/acquirerx_ops?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kail3114
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:9090/api/v1
        VITE_APP_NAME: AcquirerX
    container_name: ax-frontend
    ports:
      - "5173:4173"
    depends_on:
      - api-gateway