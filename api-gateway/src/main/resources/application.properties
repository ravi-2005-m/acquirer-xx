# Gateway
server.port=9090
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT (must match auth-service exactly)
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024AcquirerX
jwt.expiration=86400000

# Paths that skip JWT validation
gateway.jwt.open-paths=/api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/validate,/actuator,/eureka,/v3/api-docs,/swagger-ui,/api/v1/cors-check,OPTIONS

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=store-terminals
spring.cloud.gateway.routes[1].uri=lb://TERMINAL-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/stores/*/terminals,/api/v1/stores/*/terminals/**

spring.cloud.gateway.routes[2].id=merchant-service
spring.cloud.gateway.routes[2].uri=lb://MERCHANT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/merchants/**,/api/v1/stores/**

spring.cloud.gateway.routes[3].id=terminal-service
spring.cloud.gateway.routes[3].uri=lb://TERMINAL-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/terminals/**

spring.cloud.gateway.routes[4].id=transaction-service
spring.cloud.gateway.routes[4].uri=lb://TRANSACTION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/transactions/**,/api/v1/txns/**,/api/v1/fee-rules/**

spring.cloud.gateway.routes[5].id=risk-service
spring.cloud.gateway.routes[5].uri=lb://RISK-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/risk/**

spring.cloud.gateway.routes[6].id=settlement-service
spring.cloud.gateway.routes[6].uri=lb://SETTLEMENT-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/settlement/**,/api/v1/payout/**

spring.cloud.gateway.routes[7].id=ops-service
spring.cloud.gateway.routes[7].uri=lb://OPS-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/disputes/**,/api/v1/recon/**,/api/v1/reports/**,/api/v1/notifications/**

spring.cloud.gateway.routes[8].id=iam-service
spring.cloud.gateway.routes[8].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/iam/**

# CORS
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173,http://localhost:8080
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=Idempotent-Replayed,X-Trace-Id,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Tier,Retry-After,Location
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# Rate limiting
rate-limit.enabled=true
rate-limit.tiers.strict.capacity=5
rate-limit.tiers.strict.refill-tokens=5
rate-limit.tiers.strict.refill-period-seconds=60
rate-limit.tiers.standard.capacity=60
rate-limit.tiers.standard.refill-tokens=60
rate-limit.tiers.standard.refill-period-seconds=60
rate-limit.tiers.generous.capacity=300
rate-limit.tiers.generous.refill-tokens=300
rate-limit.tiers.generous.refill-period-seconds=60
rate-limit.tiers.lenient.capacity=120
rate-limit.tiers.lenient.refill-tokens=120
rate-limit.tiers.lenient.refill-period-seconds=60
rate-limit.paths[0].pattern=/api/v1/auth/login
rate-limit.paths[0].tier=strict
rate-limit.paths[1].pattern=/api/v1/auth/register
rate-limit.paths[1].tier=strict
rate-limit.paths[2].pattern=/api/v1/switch/authorize
rate-limit.paths[2].tier=generous
rate-limit.paths[3].pattern=/api/v1/txns/from-auth/**
rate-limit.paths[3].tier=generous
rate-limit.paths[4].pattern=/actuator/**
rate-limit.paths[4].tier=lenient
rate-limit.paths[5].pattern=/swagger-ui/**
rate-limit.paths[5].tier=lenient
rate-limit.paths[6].pattern=/v3/api-docs/**
rate-limit.paths[6].tier=lenient

# Actuator
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,diskSpace
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=always
management.info.build.enabled=true
management.info.git.enabled=true

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
